# railway.toml — Configuración de Railway para el worker
[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/worker/Dockerfile"
buildContext = "."
noCache = true

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ALWAYS"
restartPolicyMaxRetries = 10

# Railway no necesita startCommand si el Dockerfile tiene CMD. El worker sí
# expone HTTP en HEALTH_PORT; /health evita activar un deploy que nunca arrancó.
# ALWAYS también recupera salidas limpias inesperadas (SIGTERM/exit 0), que
# ON_FAILURE no reinicia.
