# railway.toml — Configuración de Railway para el worker
[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/worker/Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Railway no necesita startCommand si el Dockerfile tiene CMD
# startCommand = "node dist/index.js"

[healthcheck]
# Railway no tiene endpoint HTTP ya que es un worker long-running
# El proceso se considera "healthy" mientras esté corriendo
