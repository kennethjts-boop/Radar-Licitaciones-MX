<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Radar Licitaciones MX — Brand & Product Design</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="brand/tokens.css">

<style>
  html, body { margin: 0; padding: 0; background: #0a0c14; }
  body { font-family: 'Inter', -apple-system, sans-serif; color: #fff; }
  /* Hide scrollbars inside artboards */
  .rl-frame::-webkit-scrollbar { display: none; }
</style>
</head>
<body>

<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Data -->
<script src="brand/data.js"></script>

<!-- Brand + UI components -->
<script type="text/babel" src="brand/Logo.jsx"></script>
<script type="text/babel" src="brand/UI.jsx"></script>
<script type="text/babel" src="brand/LicitacionCard.jsx"></script>

<!-- Screens -->
<script type="text/babel" src="screens/Landing.jsx"></script>
<script type="text/babel" src="screens/Dashboard.jsx"></script>
<script type="text/babel" src="screens/Detalle.jsx"></script>
<script type="text/babel" src="screens/Mapa.jsx"></script>
<script type="text/babel" src="screens/Terminal.jsx"></script>
<script type="text/babel" src="screens/LoginAlertas.jsx"></script>

<!-- Canvas + tweaks -->
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- Identity sheet (logo lockups + colors + type) -->
<script type="text/babel">
function IdentitySheet() {
  return (
    <div className="rl-frame" style={{
      minHeight: 1080,
      padding: 56,
      background: 'var(--bg-0)',
    }}>
      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: 48 }}>
        <div>
          <div className="rl-mono rl-caps" style={{ fontSize: 11, color: 'var(--violet-300)', letterSpacing: '0.18em', marginBottom: 8 }}>
            ◉ Brand · v0.1
          </div>
          <h1 style={{
            margin: 0, fontFamily: 'var(--font-display)', fontSize: 64, fontWeight: 600,
            color: 'var(--text-1)', letterSpacing: '-0.03em', lineHeight: 1,
          }}>Identidad de marca.</h1>
          <p style={{ margin: '14px 0 0', color: 'var(--text-2)', fontSize: 16, maxWidth: 600 }}>
            Sistema visual cyber-terminal. Púrpura como autoridad institucional, cyan como
            señal en vivo, magenta para alertas, verde para estado activo.
          </p>
        </div>
        <RadarLogo size={48} />
      </div>

      {/* Logo lockups */}
      <section style={{ marginBottom: 40 }}>
        <div className="rl-mono rl-caps" style={{ fontSize: 10, color: 'var(--text-3)', letterSpacing: '0.18em', marginBottom: 16 }}>
          ◉ Logotipo · variantes
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12 }}>
          {[
            { label: 'Primario · oscuro', bg: 'var(--bg-1)' },
            { label: 'Solo símbolo', bg: 'var(--bg-1)', noLabel: true, big: true },
            { label: 'Sobre acento', bg: 'linear-gradient(135deg, var(--violet-600), var(--cyan-500))' },
            { label: 'Sobre claro', bg: '#F5F3FF', light: true },
          ].map((v, i) => (
            <div key={i} style={{
              padding: 32, borderRadius: 'var(--r-lg)',
              background: v.bg,
              border: '1px solid var(--line-1)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              minHeight: 160,
            }}>
              <div style={v.light ? { filter: 'invert(1) hue-rotate(180deg)' } : {}}>
                <RadarLogo size={v.big ? 80 : 44} label={!v.noLabel} />
              </div>
            </div>
          ))}
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, marginTop: 12 }}>
          {[
            { label: 'Primario · oscuro' },
            { label: 'Solo símbolo' },
            { label: 'Sobre acento' },
            { label: 'Sobre claro' },
          ].map((v, i) => (
            <div key={i} className="rl-mono rl-caps" style={{
              fontSize: 10, color: 'var(--text-3)', letterSpacing: '0.14em', textAlign: 'center',
            }}>{v.label}</div>
          ))}
        </div>
      </section>

      {/* Colors */}
      <section style={{ marginBottom: 40 }}>
        <div className="rl-mono rl-caps" style={{ fontSize: 10, color: 'var(--text-3)', letterSpacing: '0.18em', marginBottom: 16 }}>
          ◉ Paleta · color tokens
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(6, 1fr)', gap: 10 }}>
          {[
            { name: 'Violet 600', val: '#7C3AED', use: 'Primario · CTA · brand', token: '--violet-600' },
            { name: 'Cyan 400', val: '#22D3EE', use: 'Secundario · live · señal', token: '--cyan-400' },
            { name: 'Magenta 500', val: '#D946EF', use: 'Acento · destacados', token: '--magenta-500' },
            { name: 'Active', val: '#10F2A8', use: 'Estado activo · OK', token: '--status-active' },
            { name: 'Closing', val: '#FFB020', use: 'Cerrando · warning', token: '--status-closing' },
            { name: 'Alert', val: '#FF4D6D', use: 'Alerta · error', token: '--status-alert' },
          ].map(c => (
            <div key={c.name} style={{
              borderRadius: 'var(--r-md)', overflow: 'hidden',
              border: '1px solid var(--line-2)',
            }}>
              <div style={{
                height: 70, background: c.val,
                boxShadow: `inset 0 0 0 1px rgba(255,255,255,0.1), 0 0 24px ${c.val}33`,
              }} />
              <div style={{ padding: 12, background: 'var(--bg-2)' }}>
                <div style={{ fontSize: 13, color: 'var(--text-1)', fontWeight: 600 }}>{c.name}</div>
                <div className="rl-mono" style={{ fontSize: 10, color: 'var(--text-3)', marginTop: 2 }}>{c.val}</div>
                <div className="rl-mono" style={{ fontSize: 9, color: 'var(--violet-300)', marginTop: 4 }}>{c.token}</div>
                <div style={{ fontSize: 11, color: 'var(--text-2)', marginTop: 6 }}>{c.use}</div>
              </div>
            </div>
          ))}
        </div>

        {/* Neutrals */}
        <div style={{ display: 'flex', gap: 0, marginTop: 16, borderRadius: 'var(--r-md)', overflow: 'hidden', border: '1px solid var(--line-2)' }}>
          {[
            { name: 'bg-0', val: '#06070C' },
            { name: 'bg-1', val: '#0B0E18' },
            { name: 'bg-2', val: '#11162A' },
            { name: 'bg-3', val: '#181F3A' },
            { name: 'text-3', val: '#6B6889' },
            { name: 'text-2', val: '#B8B5D1' },
            { name: 'text-1', val: '#F5F3FF' },
          ].map(c => (
            <div key={c.name} style={{
              flex: 1, padding: 18, background: c.val,
              color: c.val.startsWith('#0') || c.val.startsWith('#1') ? '#F5F3FF' : '#06070C',
            }}>
              <div className="rl-mono rl-caps" style={{ fontSize: 9, letterSpacing: '0.16em', opacity: 0.7 }}>{c.name}</div>
              <div className="rl-mono" style={{ fontSize: 11, marginTop: 4, fontWeight: 600 }}>{c.val}</div>
            </div>
          ))}
        </div>
      </section>

      {/* Typography */}
      <section style={{ marginBottom: 40 }}>
        <div className="rl-mono rl-caps" style={{ fontSize: 10, color: 'var(--text-3)', letterSpacing: '0.18em', marginBottom: 16 }}>
          ◉ Tipografía
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 20 }}>
          {[
            { f: "'Space Grotesk'", v: 'var(--font-display)', n: 'Display · Space Grotesk', use: 'Headlines · cards · hero', sample: 'Inteligencia\\nde licitaciones' },
            { f: "'Inter'", v: 'var(--font-sans)', n: 'Body · Inter', use: 'Texto general · UI', sample: 'Encuentra la próxima oportunidad antes que tu competencia.' },
            { f: "'JetBrains Mono'", v: 'var(--font-mono)', n: 'Mono · JetBrains Mono', use: 'Datos · IDs · timestamps · UI caps', sample: 'LA-50-GYR-050GYR010\\n14:42:08 · $96.5M' },
          ].map((t, i) => (
            <div key={i} style={{
              padding: 24, borderRadius: 'var(--r-lg)',
              background: 'var(--bg-2)', border: '1px solid var(--line-1)',
            }}>
              <div className="rl-mono rl-caps" style={{ fontSize: 9, color: 'var(--violet-300)', letterSpacing: '0.18em', marginBottom: 12 }}>{t.n}</div>
              <div style={{
                fontFamily: t.v,
                fontSize: i === 0 ? 36 : i === 1 ? 18 : 16,
                fontWeight: i === 0 ? 600 : 400,
                lineHeight: 1.15,
                color: 'var(--text-1)',
                letterSpacing: i === 0 ? '-0.02em' : 'normal',
                marginBottom: 14,
                whiteSpace: 'pre-wrap',
              }}>{t.sample.replace(/\\n/g, '\n')}</div>
              <div style={{ fontSize: 12, color: 'var(--text-3)' }}>{t.use}</div>
            </div>
          ))}
        </div>
      </section>

      {/* UI primitives */}
      <section>
        <div className="rl-mono rl-caps" style={{ fontSize: 10, color: 'var(--text-3)', letterSpacing: '0.18em', marginBottom: 16 }}>
          ◉ Componentes · primitivos
        </div>
        <div style={{
          padding: 28, borderRadius: 'var(--r-lg)',
          background: 'var(--bg-2)', border: '1px solid var(--line-1)',
          display: 'flex', flexDirection: 'column', gap: 24,
        }}>
          {/* Pills */}
          <div>
            <div className="rl-mono rl-caps" style={{ fontSize: 9, color: 'var(--text-3)', letterSpacing: '0.18em', marginBottom: 10 }}>STATUS PILLS</div>
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              <StatusPill status="activa" />
              <StatusPill status="cerrando" />
              <StatusPill status="nueva" />
              <StatusPill status="cerrada" />
              <StatusPill status="alerta" />
            </div>
          </div>
          {/* Buttons */}
          <div>
            <div className="rl-mono rl-caps" style={{ fontSize: 9, color: 'var(--text-3)', letterSpacing: '0.18em', marginBottom: 10 }}>BOTONES</div>
            <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
              <button className="rl-mono rl-caps" style={{ padding: '12px 18px', borderRadius: 'var(--r-md)', background: 'linear-gradient(135deg, var(--violet-600), var(--violet-700))', border: '1px solid var(--violet-500)', color: '#fff', fontSize: 11, letterSpacing: '0.16em', cursor: 'pointer', fontFamily: 'var(--font-mono)', boxShadow: 'var(--glow-violet)' }}>Primario CTA</button>
              <button className="rl-mono rl-caps" style={{ padding: '12px 18px', borderRadius: 'var(--r-md)', background: 'var(--bg-3)', border: '1px solid var(--line-2)', color: 'var(--text-1)', fontSize: 11, letterSpacing: '0.16em', cursor: 'pointer', fontFamily: 'var(--font-mono)' }}>Secundario</button>
              <button className="rl-mono rl-caps" style={{ padding: '12px 18px', borderRadius: 'var(--r-md)', background: 'transparent', border: '1px solid var(--line-2)', color: 'var(--text-2)', fontSize: 11, letterSpacing: '0.16em', cursor: 'pointer', fontFamily: 'var(--font-mono)' }}>Ghost</button>
              <button className="rl-mono rl-caps" style={{ padding: '12px 18px', borderRadius: 'var(--r-md)', background: 'rgba(255,77,109,0.10)', border: '1px solid rgba(255,77,109,0.30)', color: 'var(--status-alert)', fontSize: 11, letterSpacing: '0.16em', cursor: 'pointer', fontFamily: 'var(--font-mono)' }}>Destructivo</button>
            </div>
          </div>
          {/* Chips */}
          <div>
            <div className="rl-mono rl-caps" style={{ fontSize: 9, color: 'var(--text-3)', letterSpacing: '0.18em', marginBottom: 10 }}>CHIPS DE ESTADO</div>
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              <EstadoChip code="CMX" name="Ciudad de México" />
              <EstadoChip code="JAL" name="Jalisco" />
              <EstadoChip code="OAX" name="Oaxaca" />
              <EstadoChip code="NLE" name="Nuevo León" />
              <EstadoChip code="TAB" name="Tabasco" />
            </div>
          </div>
          {/* Card preview */}
          <div>
            <div className="rl-mono rl-caps" style={{ fontSize: 9, color: 'var(--text-3)', letterSpacing: '0.18em', marginBottom: 10 }}>CARD DE LICITACIÓN</div>
            <div style={{ maxWidth: 320 }}>
              <LicitacionCard data={window.RL_DATA.licitaciones[7]} cardStyle="glow" />
            </div>
          </div>
        </div>
      </section>
    </div>
  );
}
window.IdentitySheet = IdentitySheet;
</script>

<!-- App -->
<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "density": "compact",
  "cardStyle": "flat"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Apply theme to document
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', tweaks.theme);
  }, [tweaks.theme]);

  return (
    <>
      <DesignCanvas>
        <DCSection id="brand" title="Identidad" subtitle="Sistema visual · marca completa">
          <DCArtboard id="identity" label="01 · Brand sheet" width={1280} height={1480}>
            <IdentitySheet />
          </DCArtboard>
        </DCSection>

        <DCSection id="acquisition" title="Acquisition" subtitle="Landing pública + login">
          <DCArtboard id="landing" label="02 · Landing" width={1440} height={1100}>
            <Landing />
          </DCArtboard>
          <DCArtboard id="login" label="03 · Login" width={1280} height={840}>
            <Login />
          </DCArtboard>
        </DCSection>

        <DCSection id="product" title="Producto" subtitle="App principal · grid + filtros + datos">
          <DCArtboard id="dashboard" label="04 · Dashboard / Radar (reemplaza el actual)" width={1440} height={1280}>
            <Dashboard tweaks={tweaks} />
          </DCArtboard>
          <DCArtboard id="detalle" label="05 · Detalle de licitación" width={1440} height={1280}>
            <Detalle />
          </DCArtboard>
        </DCSection>

        <DCSection id="data" title="Datos" subtitle="Mapa de México + terminal de tabla">
          <DCArtboard id="mapa" label="06 · Mapa nacional" width={1440} height={1080}>
            <Mapa />
          </DCArtboard>
          <DCArtboard id="terminal" label="07 · Terminal Bloomberg-style" width={1440} height={900}>
            <Terminal />
          </DCArtboard>
        </DCSection>

        <DCSection id="account" title="Cuenta" subtitle="Alertas + perfil + favoritos">
          <DCArtboard id="alertas" label="08 · Alertas y perfil" width={1440} height={1080}>
            <Alertas />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks · Radar MX">
        <TweakSection title="Apariencia">
          <TweakRadio
            label="Tema"
            value={tweaks.theme}
            onChange={v => setTweak('theme', v)}
            options={[
              { value: 'dark', label: 'Oscuro' },
              { value: 'light', label: 'Claro' },
            ]}
          />
        </TweakSection>
        <TweakSection title="Cards de licitación">
          <TweakRadio
            label="Densidad"
            value={tweaks.density}
            onChange={v => setTweak('density', v)}
            options={[
              { value: 'comfy', label: 'Cómoda' },
              { value: 'compact', label: 'Compacta' },
            ]}
          />
          <TweakRadio
            label="Estilo"
            value={tweaks.cardStyle}
            onChange={v => setTweak('cardStyle', v)}
            options={[
              { value: 'flat', label: 'Plano' },
              { value: 'shadow', label: 'Sombra' },
              { value: 'glow', label: 'Glow' },
            ]}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
